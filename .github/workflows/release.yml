name: Release & Publish

on:
  push:
    branches:
      - main
  # Manual publish of the version currently in package.json — recovery for
  # runs where release-please tagged but the publish steps failed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          
      # The following steps will only run if a release was created
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        
      - uses: pnpm/action-setup@v2
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        with:
          version: 11
          
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          
      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: pnpm install --frozen-lockfile
        
      - name: Verify & build
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: pnpm verify
        
      - name: Publish to NPM
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: pnpm publish --no-git-checks --provenance --access public

      - name: Update JSR version
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg v "$VERSION" '.version = $v' jsr.json > temp.json && mv temp.json jsr.json

      - name: Publish to JSR
        if: ${{ steps.release.outputs.release_created || github.event_name == 'workflow_dispatch' }}
        run: pnpx jsr publish --allow-dirty
